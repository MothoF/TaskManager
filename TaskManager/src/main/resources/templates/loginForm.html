<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Form</title>
    <meta name="author" content="Tshepo Majoro">
    <link th:href="@{/loginFormStyles.css}" rel="stylesheet" type="text/css">
</head>
<body>
    <main>
        <h2>Welcome back</h2>
        <p>Sign in to continue</p>
        <form method="post" th:action="@{/login}">
            <label for="username">Username:</label>
            <input type="text" id="username" maxlength="50" th:field="${user.username}" placeholder="Enter your username"
                   required>
            <label for="password">Password:</label>
            <input type="password" id="password" minlength="8" maxlength="20" placeholder="Enter your password"
                   th:field="${user.password}" required>
            <button type="submit">Login</button>
        </form>
        <p><a th:href="@{/register}">Register a new account</a> || <a th:href="@{/changePassword}">Create a new password</a></p>
    </main>
</body>
</html>
