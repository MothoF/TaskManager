<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<head>
    <meta charset="UTF-8">
    <title>User Registration Form</title>
    <meta name="author" content="Tshepo Majoro"/>
</head>
<body>
    <main>
        <form>
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" th:field="user.firstname" maxlength="20" required>
            <label>Last Name:</label>
            <input type="text" id="lastName" th:field="user.lastname" maxlength="20" required>
            <label>Email</label>
            <input type="email" id="email" th:field="user.username" required>
            <label>Password:</label>
            <input type="password" id="password" th:field="user.password" minlength="8" maxlength="8" required>
            <label>Gender:</label>
            <input type="button" name="gender" value="Male" th:field="user.gender">
            <input type="button" name="gender" value="Female" th:field="user.gender">
            <input type="button" name="gender" value="Other">
            <label class="otherGender hidden" for="gender">Specify your gender here:</label>
            <input class="otherGender hidden" type="text" id="gender" th:field="user.gender" minlength="4" maxlength="20" required>
            <button type="submit">Register</button>
        </form>
    </main>
</body>
</html>
